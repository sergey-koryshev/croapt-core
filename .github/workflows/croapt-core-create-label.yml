name: Create CroApt Core Version Label

concurrency: versioning

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - epic/**

jobs:
  create_label:
    name: Create Version Label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    env:
      ROOT_PATH: source/frontend
      PRODUCT_VERSION_FILE: version.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Increment Version
        uses: sergey-koryshev/bump-version@v1.0.4
        with:
          project-type: Node
          version-configuration-path: version-configuration.json